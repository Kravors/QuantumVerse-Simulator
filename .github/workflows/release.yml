name: Release
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    tags: ['v*']

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      id: setup_qt
      with:
        version: '6.8.*'
        target: 'desktop'
        host: 'windows'
        arch: 'win64_msvc2022_64'
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
    - name: Ensure reports directory exists
      run: New-Item -ItemType Directory -Path reports -Force
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
    - name: Build
      run: cmake --build build --config Release --parallel
    - name: Deploy Qt runtime
      run: cmake --build build --config Release --target deploy_qt_runtime
    - name: Package as zip
      run: |
        cd build/Release
        7z a ../../quantumverse_v${{ github.ref_name }}_win64.zip ^
           quantumverse_qml.exe ^
           *.dll *.conf ^
           qt.conf ^
           plugins/ ^
           qml/
    - name: Upload release artifact
      uses: actions/upload-artifact@v5
      with:
        name: quantumverse-windows
        path: quantumverse_v${{ github.ref_name }}_win64.zip
