name: Release

on:
  push:
    tags: ['v*']

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.11.1
        arch: msvc2022_64
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON
    - name: Build
      run: cmake --build build --config Release --parallel
    - name: Deploy Qt runtime
      run: cmake --build build --config Release --target deploy_qt_runtime
    - name: Package as zip
      run: |
        cd build/Release
        7z a ../../quantumverse_v${{ github.ref_name }}_win64.zip ^
            quantumverse_qml.exe ^
            quantumverse_imgui.exe ^
            *.dll *.conf ^
            qt.conf ^
            plugins/ ^
            qml/
    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: quantumverse-windows
        path: quantumverse_v${{ github.ref_name }}_win64.zip
