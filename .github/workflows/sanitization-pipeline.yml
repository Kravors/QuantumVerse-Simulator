name: Cross-Platform Sanitization Pipeline
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Mondays at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  asan-linux:
    continue-on-error: true
    name: AddressSanitizer (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev libglu-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libpcre2-dev libfreetype6-dev libpng-dev libjpeg-dev \
            libsqlite3-dev libharfbuzz-dev libb2-dev libdouble-conversion-dev \
            ninja-build ccache

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'linux'
          arch: 'linux_gcc_64'

          cache: true

      - name: Configure CMake with ASan
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DQUANTUMVERSE_BUILD_TESTS=ON \
            -DQUANTUMVERSE_USE_ASAN=ON \
            -DQUANTUMVERSE_USE_QT=ON \
            -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}" \
            -DCMAKE_CXX_FLAGS_DEBUG="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS_DEBUG="-fsanitize=address"
      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Run tests with ASan
        working-directory: build
        run: |
          export ASAN_OPTIONS=detect_leaks=1:abort_on_error=1:symbolize=1
          ctest --output-on-failure -j $(nproc)

      - name: Ensure reports directory exists
        run: mkdir -p reports

      - name: Upload ASan report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: asan-report-linux
          path: |
            build/**/*.log
            *.log

  ubsan-linux:
    continue-on-error: true
    name: UndefinedBehaviorSanitizer (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev libglu-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libpcre2-dev libfreetype6-dev libpng-dev libjpeg-dev \
            libsqlite3-dev libharfbuzz-dev libb2-dev libdouble-conversion-dev \
            ninja-build ccache

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'linux'
          arch: 'linux_gcc_64'

          cache: true

      - name: Configure CMake with UBSan
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DQUANTUMVERSE_BUILD_TESTS=ON \
            -DQUANTUMVERSE_USE_UBSAN=ON \
            -DQUANTUMVERSE_USE_QT=ON \
            -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}" \
            -DCMAKE_CXX_FLAGS_DEBUG="-fsanitize=undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS_DEBUG="-fsanitize=undefined"
      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Run tests with UBSan
        working-directory: build
        run: |
          export UBSAN_OPTIONS=abort_on_error=1:print_stacktrace=1
          ctest --output-on-failure -j $(nproc)

      - name: Upload UBSan report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ubsan-report-linux
          path: |
            build/**/*.log
            *.log

  tsan-linux:
    continue-on-error: true
    name: ThreadSanitizer (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev libglu-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libpcre2-dev libfreetype6-dev libpng-dev libjpeg-dev \
            libsqlite3-dev libharfbuzz-dev libb2-dev libdouble-conversion-dev \
            ninja-build ccache

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'linux'
          arch: 'linux_gcc_64'

          cache: true

      - name: Configure CMake with TSan
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DQUANTUMVERSE_BUILD_TESTS=ON \
            -DQUANTUMVERSE_USE_TSAN=ON \
            -DQUANTUMVERSE_USE_QT=ON \
            -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}" \
            -DCMAKE_CXX_FLAGS_DEBUG="-fsanitize=thread -g" \
            -DCMAKE_EXE_LINKER_FLAGS_DEBUG="-fsanitize=thread"
      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Run tests with TSan
        working-directory: build
        run: |
          ctest --output-on-failure -j 2  # TSan requires single-threaded execution

      - name: Upload TSan report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: tsan-report-linux
          path: |
            build/**/*.log
            *.log

  asan-windows:
    continue-on-error: true
    name: AddressSanitizer (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.8.*'
          target: desktop
          host: windows
          arch: 'win64_msvc2022_64'

          cache: true

      - name: Configure CMake with ASan
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Debug `
            -DQUANTUMVERSE_BUILD_TESTS=ON `
            -DQUANTUMVERSE_USE_ASAN=ON `
            -DQUANTUMVERSE_USE_QT=ON `
            -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Run tests with ASan
        working-directory: build
        run: |
          $env:ASAN_OPTIONS = "detect_leaks=1:abort_on_error=1"
          ctest -C Debug --output-on-failure -j 4

      - name: Upload ASan report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: asan-report-windows
          path: |
            build/**/*.log
            *.log

