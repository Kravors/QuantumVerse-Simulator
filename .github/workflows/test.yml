name: Tests
permissions:
  contents: read
  actions: read
  checks: write


on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.11.0'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
          cache: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev mesa-utils xvfb
      
      - name: Ensure reports directory exists
        run: mkdir -p reports
      
      - name: Configure CMake
        run: cmake -B build -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
      
      - name: Build
        run: cmake --build build --config Release --parallel
      
      - name: Run unit tests
        run: cd build && ctest --output-on-failure -L unit
      
      - name: Run integration tests
        run: cd build && ctest --output-on-failure -L integration
      
      - name: Run validation tests
        run: cd build && ctest --output-on-failure -L validation
      
      - name: Run benchmarks
        run: cd build && ctest --output-on-failure -L benchmark
      
      - name: Check performance regression
        run: |
          if [ -f scripts/check_performance.py ] && [ -f benchmarks.json ]; then
            python3 scripts/check_performance.py benchmarks.json
          else
            echo "Performance regression check skipped (script or benchmarks.json not found)"
          fi

  performance-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.11.0'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
          cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev mesa-utils xvfb

      - name: Ensure reports directory exists
        run: mkdir -p reports

      - name: Configure CMake
        run: cmake -B build -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCTEST_PERFORMANCE_THRESHOLD=60 -DCTEST_PERFORMANCE_MAX_THRESHOLD=80 -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"

      - name: Build performance targets
        run: cmake --build build --config Release --target qml_performance_baseline test_performance_gate

      - name: Run performance gate
        run: |
          export QT_QPA_PLATFORM=offscreen
          cd build
          ctest -C Release -R "Performance" --output-on-failure
