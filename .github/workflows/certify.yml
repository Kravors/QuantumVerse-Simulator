name: Physics Certification

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-declarative-dev libgl1-mesa-dev
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install sympy numpy
    - name: Configure and build
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQUANTUMVERSE_BUILD_TESTS=ON && cmake --build build
    - name: Run full test suite
      run: ctest --test-dir build -C Release --output-on-failure
    - name: Symbolic verification (1000 points)
      run: python scripts/verify_symbolic.py --points 1000 --seed 0
    - name: Observational data tests
      run: ctest --test-dir build -C Release -R ObservationalDataTest
    - name: Fuzz testing (10 minutes)
      run: |
        export FUZZ_CYCLES=100000
        timeout 600 build/fuzz_physics_invariants
    - name: Generate certification report
      run: |
        echo "# QuantumVerse Certification Report" > cert_report.md
        echo "Date: $(date)" >> cert_report.md
        echo "### Unit Tests" >> cert_report.md
        ctest --test-dir build -C Release --output-on-failure -N | tail -1 >> cert_report.md
        echo "### Symbolic Verification" >> cert_report.md
        python scripts/verify_symbolic.py --points 1000 --summary >> cert_report.md
        echo "### Observational Data" >> cert_report.md
        ctest --test-dir build -C Release -R ObservationalDataTest -N | tail -1 >> cert_report.md
        echo "### Fuzz Testing" >> cert_report.md
        echo "Fuzzer ran for 10 minutes without invariant violation." >> cert_report.md
    - uses: actions/upload-artifact@v4
      with:
        name: certification-report
        path: cert_report.md
