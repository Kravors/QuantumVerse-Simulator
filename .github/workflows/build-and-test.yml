name: Build and Test
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install vcpkg (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\\vcpkg\\bootstrap-vcpkg.bat
    
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libglm-dev libeigen3-dev libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-x11-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-xcb-dev libpcre2-dev libfreetype6-dev libpng-dev libjpeg-dev libsqlite3-dev libharfbuzz-dev libb2-dev libdouble-conversion-dev
      
    - name: Install Qt6 (Linux)
      if: runner.os == 'Linux'
      uses: jurplel/install-qt-action@v4
      id: setup_qt_linux
      with:
        version: '6.11.0'
        target: 'desktop'
        arch: 'linux_gcc_64'
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
      
    - name: Install Qt6 (Windows)
      if: runner.os == 'Windows'
      uses: jurplel/install-qt-action@v4
      id: setup_qt_windows
      with:
        version: '6.11.0'
        target: 'desktop'
        host: 'windows'
        arch: msvc2022_64
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
      
    - name: Install Qt6 (macOS)
      if: runner.os == 'macOS'
      uses: jurplel/install-qt-action@v4
      id: setup_qt_macos
      with:
        version: '6.11.0'
        target: 'desktop'
        host: 'mac'
        arch: 'macos_arm64'
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
      
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt_linux.outputs.Qt6_DIR || steps.setup_qt_windows.outputs.Qt6_DIR || steps.setup_qt_macos.outputs.Qt6_DIR }}"
    
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: Deploy Qt runtime (Windows)
      if: runner.os == 'Windows'
      run: cmake --build build --config ${{ matrix.build_type }} --target deploy_qt_runtime
    
    - name: Run tests
      working-directory: build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure
    
    - name: Ensure reports directory exists
      run: mkdir -p reports
    
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
        path: build/Testing/Temporary/

  validate-physics:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build physics tests
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DQUANTUMVERSE_BUILD_TESTS=ON
        cmake --build build --config Release --parallel
    
    - name: Run physics validation
      working-directory: build
      run: ctest -C Release -R "MercuryPrecessionTest|LightDeflectionTest|GravitationalRedshiftTest|FrameDraggingTest" --output-on-failure

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy cmake build-essential
    
    - name: Configure CMake for clang-tidy
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DQUANTUMVERSE_BUILD_TESTS=ON
    
    - name: Run clang-tidy
      run: |
        clang-tidy -p build -checks='bugprone-*,performance-*,modernize-*,cppcoreguidelines-*,readability-*,cert-*,clang-analyzer-*' \
          $(find src -name '*.cpp' -o -name '*.h') 2>&1 | tee clang-tidy.log || true
    
    - name: Check for warnings
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror"
        cmake --build build 2>&1 | grep -i warning && exit 1 || echo "No warnings found"
