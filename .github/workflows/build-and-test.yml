name: Build and Test
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install vcpkg (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\\vcpkg\\bootstrap-vcpkg.bat
    
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libglm-dev libeigen3-dev libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-x11-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-xcb-dev libpcre2-dev libfreetype6-dev libpng-dev libjpeg-dev libsqlite3-dev libharfbuzz-dev libb2-dev double-conversion
      
    - name: Install Qt6 (Linux)
      if: runner.os == 'Linux'
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.11.1'
        target: 'desktop'
        arch: 'linux_gcc_64'
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
      env:
        Qt6_DIR: ${{ env.Qt6_DIR }}
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
      env:
        Qt6_DIR: ${{ env.Qt6_DIR }}
    
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: Run tests
      working-directory: build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure
    
    - name: Ensure reports directory exists
      run: mkdir -p reports
    
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
        path: build/Testing/Temporary/

  validate-physics:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
    
    - name: Run physics validation
      working-directory: build
      run: |
        ./test_mercury_precession
        ./test_light_deflection
        ./test_gravitational_redshift
        ./test_frame_dragging

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run clang-tidy
      run: |
        sudo apt-get install -y clang-tidy
        clang-tidy --checks='*' src/**/*.cpp -- -std=c++17
    
    - name: Check for warnings
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror"
        cmake --build build 2>&1 | grep -i warning && exit 1 || echo "No warnings found"
