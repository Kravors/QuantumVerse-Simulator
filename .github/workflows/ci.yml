name: CI
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
        qt_version: [6.11.0]
    steps:
    - uses: actions/checkout@v5
    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      id: setup_qt
      with:
        version: ${{ matrix.qt_version }}
        target: 'desktop'
        host: 'windows'
        arch: msvc2022_64
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DQUANTUMVERSE_USE_ASAN=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel
    - name: Deploy Qt runtime
      run: cmake --build build --config ${{ matrix.build_type }} --target deploy_qt_runtime
    - name: Run tests (excl. slow)
      run: ctest -C ${{ matrix.build_type }} -E "PerformanceGateTest|QMLPerformanceBaseline" --output-on-failure
    - name: Run ASan tests (Debug only)
      if: matrix.build_type == 'Debug'
      run: ctest -C Debug -R MemoryLeakTest --output-on-failure

  build-and-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
        qt_version: [6.11.0]
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Qt (Linux)
      uses: jurplel/install-qt-action@v4
      id: setup_qt
      with:
        version: ${{ matrix.qt_version }}
        target: 'desktop'
        host: 'linux'
        arch: 'linux_gcc_64'
        modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
        cache: true
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev mesa-utils xvfb
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
    
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel
    
    - name: Run tests (excl. slow)
      run: ctest -C ${{ matrix.build_type }} -E "PerformanceGateTest|QMLPerformanceBaseline" --output-on-failure
