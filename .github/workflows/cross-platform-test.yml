name: Cross-Platform Tests
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-20.04]
        build_type: [Release]
        include:
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            cmake_args: ""
          - os: macos-latest
            generator: "Xcode"
            cmake_args: ""
          - os: ubuntu-20.04
            generator: "Unix Makefiles"
            cmake_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pybind11
        run: |
          python -m pip install --upgrade pip
          pip install pybind11

      - name: Install Qt6 (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.11.0'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
          cache: true

      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.11.0'
          target: 'desktop'
          arch: msvc2022_64
          modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
          cache: true

      - name: Add Qt to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "${{ steps.setup_qt.outputs.Qt6_DIR }}\bin" >> $GITHUB_PATH

      - name: Install Qt6 (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.11.0'
          target: 'desktop'
          arch: 'macos_arm64'
          modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
          cache: true

      - name: Configure CMake
        run: cmake -B build -G "${{ matrix.generator }}" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DQUANTUMVERSE_USE_QML=OFF -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel 4

      - name: Run tests
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure -j 4

      - name: Ensure reports directory exists
        run: mkdir -p reports

      - name: Run security tests
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} -R SecurityTest --output-on-failure

      - name: Run performance tests
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} -R PerformanceMonitorTest --output-on-failure

  # Windows-specific tests
  test-windows:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6 (Windows)
        uses: jurplel/install-qt-action@v4
        id: setup_qt
        with:
          version: '6.11.0'
          target: 'desktop'
          arch: msvc2022_64
          modules: 'qtbase qtdeclarative qtquickcontrols2 qtsvg'
          cache: true

      - name: Add Qt to PATH (Windows)
        run: echo "${{ steps.setup_qt.outputs.Qt6_DIR }}\bin" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
          cmake --build build --config Release --parallel 4

      - name: Run all tests
        working-directory: build
        run: ctest -C Release --output-on-failure

  # Code quality checks
  code-quality:
    runs-on: ubuntu-20.04
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Clang-Tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run Clang-Tidy on Security module
        run: |
          clang-tidy src/utils/Security.cpp --checks='*' -- -std=c++17 -I src

      - name: Run Cppcheck
        run: |
          sudo apt-get install -y cppcheck
          cppcheck --enable=all --std=c++17 --suppress=missingIncludeSystem src/utils/Security.cpp
