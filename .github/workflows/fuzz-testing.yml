name: Fuzz Testing
permissions:
  contents: read
  actions: read
  checks: write


on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Tuesdays at 05:00 UTC
    - cron: '0 5 * * 2'
  workflow_dispatch:

jobs:
  fuzz-metric:
    continue-on-error: true
    name: Metric Tensor Fuzzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Clang for libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 llvm-17 llvm-17-dev libclang-rt-17-dev
          echo "CC=clang-17" >> $GITHUB_ENV
          echo "CXX=clang++-17" >> $GITHUB_ENV

      - name: Configure CMake with libFuzzer
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DQUANTUMVERSE_USE_FUZZER=ON -DCMAKE_C_COMPILER=clang-17 -DCMAKE_CXX_COMPILER=clang++-17 -DCMAKE_CXX_FLAGS="-fsanitize=fuzzer-no-link -fsanitize=address -g"

      - name: Build fuzzer
        run: cmake --build build --parallel

      - name: Run metric fuzzer
        run: |
          cd build
          if [ -f ./fuzz_metric ]; then
            timeout 300 ./fuzz_metric -max_total_time=300 -detect_leaks=1 || true
          else
            echo "fuzz_metric not available - skipping"
          fi

      - name: Upload fuzzer crash reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: fuzz-crash-reports
          path: |
            build/crash-*
            *.log

