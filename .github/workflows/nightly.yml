name: Nightly Deep Validation
permissions:
  contents: read
  actions: read
  checks: write


on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual triggering

jobs:
  deep-validation:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      id: setup_qt
      with:
        version: '6.8.*'
        target: 'desktop'
        host: 'windows'
        arch: 'win64_msvc2022_64'

        cache: true
    - name: Build with ASan
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DQUANTUMVERSE_USE_ASAN=ON -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt.outputs.Qt6_DIR }}"
    - name: Build
      run: cmake --build build --config Debug --parallel
    - name: Deploy Qt runtime
      run: cmake --build build --config Debug --target deploy_qt_runtime
    - name: Full test suite
      run: ctest -C Debug --output-on-failure
    - name: Fuzz campaign (10 min)
      run: |
        cd build/Debug
        if (Test-Path .\fuzz_instruments.exe) { .\fuzz_instruments.exe --max_time=600 }
        if (Test-Path .\fuzz_geodesic_differential.exe) { .\fuzz_geodesic_differential.exe --max_time=600 }
    - name: Run shader validation
      run: cmake --build build --target validate_shaders
