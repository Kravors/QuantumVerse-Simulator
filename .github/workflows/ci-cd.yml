name: QuantumVerse CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0'

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libgl1-mesa-dev libglfw3-dev \
            libglew-dev libopenblas-dev \
            qtbase5-dev qttools5-dev-tools

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $GITHUB_ENV
          echo "${{ github.workspace }}\vcpkg" >> $GITHUB_PATH

      - name: Install Windows Dependencies via vcpkg
        if: runner.os == 'Windows'
        run: |
          .\vcpkg\vcpkg install glfw3 glew openblas qt5 --triplet x64-windows

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DQUANTUMVERSE_USE_IMGUI=ON \
            -DQUANTUMVERSE_ENABLE_QUANTUM_GRAVITY=ON \
            -DQUANTUMVERSE_BUILD_TESTS=ON \
            ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake' || '' }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure -C ${{ env.BUILD_TYPE }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: QuantumVerse-${{ matrix.os }}-${{ env.BUILD_TYPE }}
          path: |
            build/Release/quantumverse_imgui.exe
            build/Release/quantumverse_qml.exe
            build/Testing/**/*
            build/**/*.log
          if-no-files-found: warn

  security:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: autobuild

      - name: Install Dependencies (minimal)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglfw3-dev libglew-dev

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  deploy:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: QuantumVerse ${{ github.ref_name }}
          body: |
            ## QuantumVerse Simulator ${{ github.ref_name }}
            - Build from commit ${{ github.sha }}
            - Includes Windows and Linux executables
            - All tests passing, static analysis clean
          files: |
            artifacts/QuantumVerse-windows-latest-Release/**/*
            artifacts/QuantumVerse-ubuntu-latest-Release/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
