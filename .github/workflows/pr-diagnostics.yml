name: PR Diagnostics
permissions:
  contents: read
  actions: read
  checks: write


on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libglu1-mesa-dev libx11-dev libxrandr-dev xorg-dev
      
      - name: Install Qt6 (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v4
        id: setup_qt_linux
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'linux'
          arch: 'linux_gcc_64'

          cache: true
      
      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        id: setup_qt_windows
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'windows'
          arch: 'win64_msvc2022_64'

          cache: true
          
      - name: Install Qt6 (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        id: setup_qt_macos
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'mac'
          arch: 'macos_arm64'

          cache: true
      
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          # OpenGL and Windows SDK are included with Visual Studio Build Tools
          echo "Using pre-installed Windows SDK and OpenGL"
      
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake
      
      - name: Configure CMake (Windows)
        run: |
          cmake -B build -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_BUILD_TYPE=${{ matrix.config }} -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${{ steps.setup_qt_windows.outputs.Qt6_DIR }}"
        shell: powershell
        if: runner.os == 'Windows'
      
      - name: Configure CMake (Linux)
        run: |
          cmake -B build -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DCMAKE_PREFIX_PATH="${{ steps.setup_qt_linux.outputs.Qt6_DIR }}"
        if: runner.os == 'Linux'
      
      - name: Configure CMake (macOS)
        run: |
          cmake -B build -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DCMAKE_PREFIX_PATH="${{ steps.setup_qt_macos.outputs.Qt6_DIR }}"
        if: runner.os == 'macOS'
      
      - name: Build
        run: cmake --build build --config ${{ matrix.config }}
      
      - name: Ensure reports directory exists
        run: mkdir -p reports
      
      - name: Run tests
        run: cd build && ctest -C ${{ matrix.config }} --output-on-failure
      
      - name: Coverage check
        if: matrix.config == 'Release' && runner.os == 'Linux'
        run: |
          sudo apt-get install -y lcov || true
          cd build
          ctest -C Release --output-on-failure || true
          if [ -f "test_property_based.dir/*.gcda" ]; then
            lcov --capture --directory . --output-file coverage.info || true
            lcov --remove coverage.info '/usr/*' '*/third_party/*' '*/tests/*' -o coverage.info || true
            python3 ../../scripts/check_coverage.py --line-threshold 95 --branch-threshold 90 || echo "Coverage check completed"
          fi

  nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        id: setup_qt_linux
        with:
          version: '6.8.*'
          target: 'desktop'
          host: 'linux'
          arch: 'linux_gcc_64'

          cache: true      
      - name: Build with sanitizers
        run: |
          cmake -B build -DQUANTUMVERSE_USE_ASAN=ON -DQUANTUMVERSE_USE_TSAN=ON -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt_linux.outputs.Qt6_DIR }}"
          cmake --build build
      - name: Run sanitizer tests
        run: cd build && ctest --output-on-failure

  all-deps-build:
      runs-on: ubuntu-latest
      if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
      steps:
        - uses: actions/checkout@v5
          with:
            submodules: recursive

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y libgl-dev libglu1-mesa-dev libx11-dev libxrandr-dev xorg-dev libboost-all-dev
        - name: Install Qt6
          uses: jurplel/install-qt-action@v4
          id: setup_qt_linux
          with:
            version: '6.8.*'
            target: 'desktop'
            host: 'linux'
            arch: 'linux_gcc_64'
            cache: true
        - name: Configure CMake with all optional deps
          run: |
             cmake -B build -DQUANTUMVERSE_BUILD_TESTS=ON -DQUANTUMVERSE_USE_ASAN=ON -DQUANTUMVERSE_USE_QT=ON -DCMAKE_PREFIX_PATH="${{ steps.setup_qt_linux.outputs.Qt6_DIR }}" -DCMAKE_BUILD_TYPE=Release
        - name: Build
          run: cmake --build build --parallel
        - name: Run tests
          run: cd build && ctest --output-on-failure

  secret-scan:
     runs-on: ubuntu-latest
     if: github.event_name == 'pull_request'
     steps:
       - uses: actions/checkout@v5
         with:
           submodules: recursive

       - name: Run TruffleHog
         uses: trufflesecurity/trufflehog@main
         with:
           path: ./
           base: ${{ github.event.pull_request.base.sha }}
           head: ${{ github.event.pull_request.head.sha }}
